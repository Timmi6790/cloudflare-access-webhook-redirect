[package]
name = "cloudflare-access-webhook-redirect"
version = "0.2.8"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
path = "src/lib.rs"

[[bin]]
path = "src/main.rs"
name = "cloudflare-access-webhook-redirect"

[dependencies]
anyhow = { version = "1.0.81", features = ["backtrace"] }
thiserror = "1.0"
backtrace = "0.3.71"
actix-web = "4.5.1"
tracing-actix-web = "0.7.10"
config = "0.14.0"
serde = "1.0.197"
serde_json = "1.0.115"
reqwest = "0.12.2"
reqwest-middleware = "0.2.5"
reqwest-tracing = "0.4.8"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1.15"
tracing = "0.1.40"
tracing-subscriber = "0.3.18"
secrecy = { version = "0.8.0", features = ["serde"] }
regex = "1.10.4"
getset = "0.1.2"
derive-new = "0.6.0"
sentry = { version = "0.32.2", features = ["anyhow", "debug-images", "reqwest", "backtrace"] }

[dev-dependencies]
http = "0.2.12"
temp-env = "0.3.6"
serde_test = "1.0.176"
lazy_static = "1.4.0"
wiremock = "0.6.0"

[profile.release]
lto = true
codegen-units = 1
debug = true